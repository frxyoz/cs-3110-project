# Write a short, attention-grabbing description of your project.
desc: >
  Our project is a multiplayer card game engine built around a custom deck. Players compete to be the last one standing, each starting with 7 lives and 7 cards, where your life count dynamically caps how many cards you can hold. The game flows through structured rounds of drawing, a judgment phase (where card flips determine outcomes), and a free-form action phase where attacks, blocks, heals, and special cards with unique effects are used. Cards span basics like attacks and blocks, powerful equippables like Unlimited Attack or 50/50, and the unique and powerful judgement cards. 
